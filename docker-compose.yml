version: "3.9"

# FAISS runs embedded inside the backend process (it is a library, not a
# server), so there is no separate vector-database container.  Persistence
# is handled by the vectorstore_data volume below.
#
# Inference backend
# -----------------
# Start exactly one of the two model-server profiles:
#
#   docker compose --profile vllm     up --build   (default)
#   docker compose --profile llamacpp up --build
#
# Both model-server services are named "llm-server" in their respective
# profiles so the backend always resolves the same hostname.  Because
# docker-compose requires unique service names, the two are distinguished
# by a suffix but each declares hostname: llm-server so container-to-
# container DNS is consistent.
#
# The backend service does NOT declare depends_on for the model server
# because depends_on cannot conditionally reference a profile-gated
# service.  The backend retries inference calls via LLM_TIMEOUT_SECS and
# surfaces InferenceError as 502, so a briefly-unavailable server is
# handled gracefully without requiring a hard startup dependency.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - VECTORSTORE_PATH=/app/vectorstore
      - DATA_PATH=/app/data
      - LOGS_PATH=/app/logs
      - API_KEY=${API_KEY:-}
      - LLM_BACKEND=${LLM_BACKEND:-vllm}
      - LLM_MODEL=${LLM_MODEL:-mistral-7b-instruct}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.1}
      - LLM_TIMEOUT_SECS=${LLM_TIMEOUT_SECS:-120}
      # LLM_BASE_URL is intentionally unset here so Config.get_llm_base_url()
      # resolves the correct default for the active backend:
      #   vllm     -> http://llm-server:8000
      #   llamacpp -> http://llm-server:8080
      # Both model-server services below set hostname: llm-server so this
      # resolves correctly in either profile.
    volumes:
      - vectorstore_data:/app/vectorstore
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - frontend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  # vLLM — OpenAI-compatible inference server.
  # Requires a CUDA-capable GPU on the host.  Model weights are cached in
  # models_data at /models to avoid re-downloading between restarts.
  # Host port 8001 is exposed for direct access/debugging; the backend
  # reaches vLLM at http://llm-server:8000 over the internal Docker network.
  llm-server-vllm:
    image: vllm/vllm-openai:latest
    hostname: llm-server
    profiles:
      - vllm
    ports:
      - "8001:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command: >
      --model ${LLM_MODEL:-mistral-7b-instruct}
      --download-dir /models
    volumes:
      - models_data:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # llama.cpp — CPU-first inference server with optional GPU offload.
  # Place the GGUF model file inside the models_data volume at
  # /models/<LLAMA_MODEL_FILE> before starting.
  # Host port 8080 is exposed for direct access/debugging; the backend
  # reaches llama.cpp at http://llm-server:8080 over the internal network.
  llm-server-llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    hostname: llm-server
    profiles:
      - llamacpp
    ports:
      - "8080:8080"
    command: >
      --model /models/${LLAMA_MODEL_FILE:-mistral-7b-instruct.Q4_K_M.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
    volumes:
      - models_data:/models

volumes:
  vectorstore_data:
  models_data:
